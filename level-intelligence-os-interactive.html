<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Level Intelligence OS — Interactive Demo</title>
  <link rel="icon" href="data:," />
  <style>
    :root {
      --ink: #11161d;
      --muted: #66717c;
      --line: #d8dde3;
      --paper: #f6f7f4;
      --surface: #ffffff;
      --accent: #0d806c;
      --dark: #17202b;
    }

    * {
      box-sizing: border-box;
    }

    html,
    body {
      width: 100%;
      height: 100%;
      margin: 0;
      overflow: hidden;
      color: var(--ink);
      background: var(--paper);
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }

    .shell {
      height: 100%;
      display: grid;
      grid-template-rows: 62px 1fr;
    }

    .bar {
      display: flex;
      align-items: center;
      gap: 18px;
      padding: 0 18px;
      border-bottom: 1px solid var(--line);
      background: rgba(255, 255, 255, 0.94);
      backdrop-filter: blur(14px);
      z-index: 5;
    }

    .brand {
      display: flex;
      align-items: center;
      gap: 11px;
      min-width: 250px;
    }

    .mark {
      width: 34px;
      height: 34px;
      display: grid;
      place-items: center;
      border: 2px solid var(--ink);
      font-weight: 900;
      letter-spacing: 0;
      flex: 0 0 auto;
    }

    .brand b {
      display: block;
      font-size: 13px;
      line-height: 1.05;
    }

    .brand span {
      display: block;
      margin-top: 2px;
      color: var(--muted);
      font-size: 12px;
    }

    .tabs {
      display: inline-flex;
      align-items: center;
      gap: 4px;
      padding: 4px;
      border: 1px solid var(--line);
      background: var(--paper);
    }

    .tab {
      min-height: 38px;
      padding: 0 14px;
      border: 0;
      background: transparent;
      color: var(--muted);
      font: inherit;
      font-size: 12px;
      font-weight: 800;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      cursor: pointer;
    }

    .tab[aria-selected="true"] {
      color: #fff;
      background: var(--dark);
    }

    .meta {
      margin-left: auto;
      min-width: 220px;
      color: var(--muted);
      font-size: 12px;
      line-height: 1.35;
      text-align: right;
    }

    .open {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-height: 38px;
      padding: 0 13px;
      border: 1px solid var(--dark);
      background: var(--dark);
      color: #fff;
      text-decoration: none;
      font-size: 12px;
      font-weight: 800;
      white-space: nowrap;
    }

    .frame-wrap {
      position: relative;
      min-height: 0;
      background: #0a0d12;
    }

    iframe {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      border: 0;
      background: var(--paper);
    }

    .loading {
      position: absolute;
      inset: 0;
      display: grid;
      place-items: center;
      color: rgba(255, 255, 255, 0.74);
      background: #0a0d12;
      font-size: 13px;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      z-index: 1;
    }

    .loading.hidden {
      display: none;
    }

    @media (max-width: 820px) {
      .shell {
        grid-template-rows: auto 1fr;
      }

      .bar {
        min-height: 116px;
        align-items: stretch;
        flex-direction: column;
        gap: 10px;
        padding: 12px;
      }

      .brand,
      .meta {
        width: 100%;
        min-width: 0;
        text-align: left;
      }

      .tabs {
        width: 100%;
      }

      .tab {
        flex: 1;
        padding: 0 8px;
        font-size: 11px;
      }

      .open {
        display: none;
      }
    }
  </style>
</head>
<body>
  <div class="shell">
    <header class="bar">
      <div class="brand">
        <div class="mark">LX</div>
        <div>
          <b>Level Intelligence OS</b>
          <span>Interactive demo workbench</span>
        </div>
      </div>
      <div class="tabs" role="tablist" aria-label="Demo mode">
        <button class="tab" id="tab-opportunities" type="button" role="tab" aria-selected="true" data-mode="opportunities">Opportunities</button>
        <button class="tab" id="tab-agents" type="button" role="tab" aria-selected="false" data-mode="agents">Agent Ops</button>
      </div>
      <div class="meta" id="mode-meta">Live signal feed, scoring, pipeline, sources, alerts, and executive brief.</div>
      <a class="open" id="open-standalone" href="level-intelligence-os-demo.html" target="_blank" rel="noopener">Open standalone</a>
    </header>
    <main class="frame-wrap">
      <div class="loading" id="loading">Loading demo</div>
      <iframe id="demo-frame" title="Level Intelligence OS interactive demo" src="level-intelligence-os-demo.html"></iframe>
    </main>
  </div>

  <script>
    const modes = {
      opportunities: {
        src: "level-intelligence-os-demo.html",
        text: "Live signal feed, scoring, pipeline, sources, alerts, and executive brief."
      },
      agents: {
        src: "level-intelligence-os-agent-ops.html",
        text: "Scenario view of scouts, qualification, memory, RFQ, brief, and approval agents working."
      }
    };

    const frame = document.getElementById("demo-frame");
    const loader = document.getElementById("loading");
    const meta = document.getElementById("mode-meta");
    const openStandalone = document.getElementById("open-standalone");
    const tabs = Array.from(document.querySelectorAll(".tab"));

    function setMode(mode, updateHash = true) {
      const next = modes[mode] ? mode : "opportunities";
      tabs.forEach((tab) => tab.setAttribute("aria-selected", tab.dataset.mode === next ? "true" : "false"));
      meta.textContent = modes[next].text;
      openStandalone.href = modes[next].src;
      if (!frame.src.endsWith(modes[next].src)) {
        loader.classList.remove("hidden");
        frame.src = modes[next].src;
      }
      if (updateHash) {
        history.replaceState(null, "", next === "opportunities" ? location.pathname : `#${next}`);
      }
    }

    tabs.forEach((tab) => {
      tab.addEventListener("click", () => setMode(tab.dataset.mode));
    });

    frame.addEventListener("load", () => {
      loader.classList.add("hidden");
    });

    setMode(location.hash.replace("#", "") || "opportunities", false);
  </script>
</body>
</html>
