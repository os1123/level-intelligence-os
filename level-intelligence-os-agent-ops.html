<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Level Intelligence OS — Agent Operations</title>
  <link rel="icon" href="data:," />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet" />

  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

  <style>
    :root {
      --ink: #11161d;
      --ink-2: #2a323c;
      --muted: #626d78;
      --muted-2: #8a96a2;
      --line: #d8dde3;
      --line-2: #ebeef2;
      --paper: #f6f7f4;
      --paper-2: #efefe9;
      --surface: #ffffff;
      --accent: #0d806c;
      --accent-2: #e2f2ee;
      --accent-3: #f6fbf9;
      --gold: #bd8427;
      --gold-2: #f5e9d2;
      --blue: #4269d6;
      --blue-2: #e2eaf6;
      --purple: #8b5ac2;
      --dark: #17202b;
      --risk: #b84a4a;
      --risk-2: #f6dede;
    }
    * { box-sizing: border-box; }
    html, body { margin: 0; padding: 0; background: #0a0d12; height: 100%; }
    body {
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, sans-serif;
      color: var(--ink);
      overflow: hidden;
    }

    /* fixed canvas + letterbox */
    #stage {
      position: fixed;
      inset: 0;
      display: grid;
      place-items: center;
    }
    #canvas {
      width: 1440px;
      height: 900px;
      background: var(--paper);
      color: var(--ink);
      transform-origin: center center;
      position: relative;
      box-shadow: 0 30px 80px rgba(0,0,0,0.5);
      overflow: hidden;
    }

    /* === header === */
    .topbar {
      height: 64px;
      padding: 0 28px;
      display: flex;
      align-items: center;
      gap: 22px;
      border-bottom: 1px solid var(--line);
      background: var(--surface);
    }
    .brand {
      display: inline-grid;
      place-items: center;
      width: 36px;
      height: 36px;
      border: 2px solid var(--ink);
      font-weight: 900;
      font-size: 14px;
      letter-spacing: 0;
    }
    .crumb { font-size: 14px; font-weight: 600; color: var(--ink); }
    .crumb i { color: var(--muted); font-style: normal; font-weight: 400; margin: 0 10px; }
    .live {
      display: inline-flex; align-items: center; gap: 8px;
      font-size: 12px; font-weight: 700;
      letter-spacing: 0.16em; text-transform: uppercase;
      color: var(--accent);
      padding: 4px 10px;
      background: var(--accent-2);
    }
    .live .pulse {
      width: 8px; height: 8px;
      background: var(--accent); border-radius: 50%;
      box-shadow: 0 0 0 0 var(--accent);
      animation: pulse 1.6s infinite;
    }
    @keyframes pulse {
      0% { box-shadow: 0 0 0 0 rgba(13,128,108,0.7); }
      70% { box-shadow: 0 0 0 10px rgba(13,128,108,0); }
      100% { box-shadow: 0 0 0 0 rgba(13,128,108,0); }
    }
    .ctrl-group {
      display: flex; align-items: center; gap: 4px;
      margin-left: auto;
      font-size: 13px;
    }
    .icon-btn {
      width: 32px; height: 32px;
      display: grid; place-items: center;
      border: 1px solid var(--line);
      background: var(--surface);
      color: var(--ink);
      cursor: pointer;
      font-size: 14px;
      font-family: inherit;
    }
    .icon-btn:hover { background: var(--paper); }
    .icon-btn.on { background: var(--ink); color: #fff; border-color: var(--ink); }
    .clock {
      font-family: "JetBrains Mono", ui-monospace, monospace;
      font-size: 13px;
      color: var(--muted);
      font-variant-numeric: tabular-nums;
      padding: 0 12px;
    }

    /* === scenarios === */
    .scenarios {
      height: 60px;
      padding: 0 28px;
      display: flex;
      align-items: center;
      gap: 12px;
      border-bottom: 1px solid var(--line);
      background: var(--paper-2);
    }
    .scenarios .label {
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 0.16em;
      text-transform: uppercase;
      color: var(--muted-2);
      margin-right: 6px;
    }
    .scenario-btn {
      display: inline-flex;
      align-items: center;
      gap: 10px;
      padding: 9px 14px;
      border: 1px solid var(--line);
      background: var(--surface);
      color: var(--ink);
      font-family: inherit;
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.15s;
    }
    .scenario-btn:hover { border-color: var(--ink); }
    .scenario-btn.active { background: var(--ink); color: #fff; border-color: var(--ink); }
    .scenario-btn .play {
      width: 0; height: 0;
      border-top: 5px solid transparent;
      border-bottom: 5px solid transparent;
      border-left: 7px solid currentColor;
    }
    .scenario-btn:disabled { opacity: 0.5; cursor: not-allowed; }

    /* === main grid === */
    .main {
      height: calc(900px - 64px - 60px);
      display: grid;
      grid-template-columns: 1fr 420px;
    }

    .col-left {
      display: flex;
      flex-direction: column;
      border-right: 1px solid var(--line);
      min-height: 0;
    }
    .col-right {
      display: flex;
      flex-direction: column;
      min-height: 0;
      background: var(--surface);
    }

    /* === network === */
    .network {
      height: 430px;
      position: relative;
      background:
        linear-gradient(var(--line-2) 1px, transparent 1px) 0 0 / 32px 32px,
        linear-gradient(90deg, var(--line-2) 1px, transparent 1px) 0 0 / 32px 32px,
        var(--paper);
      border-bottom: 1px solid var(--line);
      overflow: hidden;
    }
    .net-title {
      position: absolute;
      top: 16px; left: 20px;
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 0.16em;
      text-transform: uppercase;
      color: var(--muted-2);
      z-index: 5;
    }
    .net-stats {
      position: absolute;
      top: 14px; right: 20px;
      display: flex; gap: 18px;
      font-size: 12px;
      color: var(--muted);
      z-index: 5;
    }
    .net-stats b {
      color: var(--ink);
      font-feature-settings: "tnum" 1;
      margin-right: 4px;
    }

    .agent-node {
      position: absolute;
      width: 124px;
      transform: translate(-50%, -50%);
      z-index: 3;
    }
    .agent-card {
      background: var(--surface);
      border: 1px solid var(--line);
      padding: 8px 10px 9px;
      position: relative;
      transition: all 0.25s;
    }
    .agent-card.working {
      border-color: var(--accent);
      box-shadow: 0 0 0 3px var(--accent-2);
    }
    .agent-card.awaiting {
      border-color: var(--gold);
      box-shadow: 0 0 0 3px var(--gold-2);
    }
    .agent-card.alert {
      border-color: var(--risk);
      box-shadow: 0 0 0 3px var(--risk-2);
    }
    .agent-head { display: flex; align-items: center; gap: 7px; }
    .agent-dot {
      width: 8px; height: 8px;
      background: var(--muted-2);
      border-radius: 50%;
      flex: 0 0 8px;
    }
    .agent-card.working .agent-dot {
      background: var(--accent);
      animation: pulse-dot 1.2s infinite;
    }
    .agent-card.awaiting .agent-dot { background: var(--gold); }
    .agent-card.alert .agent-dot { background: var(--risk); }
    @keyframes pulse-dot {
      0%, 100% { transform: scale(1); }
      50% { transform: scale(1.4); }
    }
    .agent-name {
      font-size: 13px;
      font-weight: 700;
      letter-spacing: -0.005em;
    }
    .agent-role {
      font-size: 10px;
      color: var(--muted);
      margin-top: 2px;
      letter-spacing: 0.04em;
      text-transform: uppercase;
      font-weight: 600;
    }
    .agent-task {
      font-size: 11px;
      color: var(--ink);
      margin-top: 6px;
      line-height: 1.32;
      min-height: 28px;
      font-style: italic;
      font-weight: 500;
    }
    .agent-task.idle { color: var(--muted-2); font-style: normal; font-weight: 400; }
    .agent-card.human {
      background: var(--ink);
      color: #fff;
      border-color: var(--ink);
    }
    .agent-card.human .agent-role { color: rgba(255,255,255,0.5); }
    .agent-card.human .agent-task { color: rgba(255,255,255,0.78); }
    .agent-card.human.awaiting {
      box-shadow: 0 0 0 3px var(--gold-2);
      border-color: var(--gold);
    }
    .agent-card.human.awaiting .agent-dot { background: var(--gold); }

    .edges, .packets {
      position: absolute;
      inset: 0;
      pointer-events: none;
    }
    .edges { z-index: 1; }
    .packets { z-index: 2; }

    /* === activity log === */
    .log-wrap {
      flex: 1;
      min-height: 0;
      display: flex;
      flex-direction: column;
    }
    .log-head {
      padding: 14px 20px 12px;
      display: flex;
      align-items: center;
      gap: 12px;
      border-bottom: 1px solid var(--line);
      background: var(--surface);
    }
    .log-head .label {
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 0.16em;
      text-transform: uppercase;
      color: var(--muted-2);
    }
    .log-head .count {
      font-size: 12px;
      color: var(--muted);
      margin-left: auto;
      font-variant-numeric: tabular-nums;
    }
    .log-body {
      flex: 1;
      overflow-y: auto;
      padding: 8px 20px 20px;
      font-family: "JetBrains Mono", ui-monospace, monospace;
      font-size: 12px;
      background: var(--surface);
    }
    .log-entry {
      display: grid;
      grid-template-columns: 72px 96px 1fr;
      gap: 14px;
      padding: 7px 0;
      border-bottom: 1px dashed var(--line-2);
      align-items: baseline;
      animation: log-in 0.4s ease-out;
    }
    @keyframes log-in {
      from { opacity: 0; transform: translateY(-4px); background: var(--accent-3); }
      to { opacity: 1; transform: translateY(0); background: transparent; }
    }
    .log-time { color: var(--muted-2); font-variant-numeric: tabular-nums; }
    .log-from {
      font-weight: 600;
      color: var(--ink);
      font-family: Inter, sans-serif;
      font-size: 11px;
      letter-spacing: 0.04em;
      text-transform: uppercase;
    }
    .log-msg {
      color: var(--ink);
      line-height: 1.5;
      font-family: Inter, sans-serif;
      font-size: 13px;
    }
    .log-msg .arrow { color: var(--accent); margin: 0 6px; font-weight: 700; }
    .log-msg .ent {
      color: var(--ink);
      font-weight: 600;
      background: var(--paper);
      padding: 1px 5px;
      border: 1px solid var(--line-2);
    }
    .log-entry.event-decide .log-msg { color: var(--accent); font-weight: 600; }
    .log-entry.event-flag .log-msg { color: var(--risk); }
    .log-entry.event-approval .log-msg { color: var(--gold); font-weight: 600; }

    /* === right column === */
    .panel {
      border-bottom: 1px solid var(--line);
    }
    .panel-head {
      padding: 14px 20px 12px;
      display: flex;
      align-items: center;
      gap: 12px;
    }
    .panel-head .label {
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 0.16em;
      text-transform: uppercase;
      color: var(--muted-2);
    }
    .panel-head .count {
      background: var(--ink);
      color: #fff;
      padding: 2px 8px;
      font-size: 11px;
      font-weight: 700;
      font-variant-numeric: tabular-nums;
    }
    .panel-head .pill {
      margin-left: auto;
      font-size: 11px;
      color: var(--muted);
      padding: 3px 9px;
      border: 1px solid var(--line);
      border-radius: 999px;
    }

    /* approvals */
    .approval {
      padding: 14px 20px;
      border-top: 1px solid var(--line-2);
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 4px 12px;
      align-items: start;
      animation: log-in 0.4s ease-out;
    }
    .approval:first-of-type { border-top: 1px solid var(--line); }
    .approval-head {
      grid-column: 1 / -1;
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 4px;
    }
    .approval-type {
      font-size: 10px;
      font-weight: 700;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      padding: 2px 7px;
    }
    .approval-type.bid { background: var(--gold-2); color: var(--gold); }
    .approval-type.outreach { background: var(--blue-2); color: var(--blue); }
    .approval-type.vendor { background: var(--risk-2); color: var(--risk); }
    .approval-type.pursue { background: var(--accent-2); color: var(--accent); }
    .approval-type.pass { background: var(--paper-2); color: var(--muted); }
    .approval-conf {
      font-family: "JetBrains Mono", monospace;
      font-size: 11px;
      color: var(--muted);
    }
    .approval-conf b { color: var(--ink); font-weight: 600; }
    .approval-title {
      font-size: 13px;
      font-weight: 600;
      line-height: 1.35;
      margin: 0;
    }
    .approval-meta {
      font-size: 11px;
      color: var(--muted);
      margin-top: 4px;
      line-height: 1.4;
    }
    .approval-actions {
      grid-column: 1 / -1;
      display: flex;
      gap: 6px;
      margin-top: 10px;
    }
    .approval-actions button {
      font-family: inherit;
      font-size: 11px;
      font-weight: 600;
      padding: 6px 12px;
      border: 1px solid var(--line);
      background: var(--surface);
      color: var(--ink);
      cursor: pointer;
    }
    .approval-actions button.primary {
      background: var(--ink);
      color: #fff;
      border-color: var(--ink);
    }
    .approval-actions button.primary:hover { background: var(--accent); border-color: var(--accent); }

    /* brief preview */
    .brief {
      padding: 14px 20px 18px;
    }
    .brief-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 8px;
      margin-top: 8px;
    }
    .brief-cell {
      border: 1px solid var(--line);
      padding: 10px 12px;
    }
    .brief-cell .k {
      font-size: 10px;
      font-weight: 700;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--muted-2);
    }
    .brief-cell .v {
      font-size: 22px;
      font-weight: 800;
      letter-spacing: -0.01em;
      line-height: 1;
      margin-top: 6px;
      font-variant-numeric: tabular-nums;
    }
    .brief-cell.green .v { color: var(--accent); }
    .brief-cell.gold .v { color: var(--gold); }
    .brief-cell.risk .v { color: var(--risk); }
    .brief-cell .x {
      font-size: 11px;
      color: var(--muted);
      margin-top: 4px;
    }
    .brief-headlines {
      margin-top: 12px;
      font-size: 12px;
      line-height: 1.5;
    }
    .brief-headlines .row {
      display: grid;
      grid-template-columns: 14px 1fr;
      gap: 8px;
      padding: 6px 0;
      border-bottom: 1px dashed var(--line-2);
      align-items: start;
    }
    .brief-headlines .row:last-child { border-bottom: 0; }
    .brief-headlines .sq {
      width: 8px; height: 8px;
      background: var(--accent);
      margin-top: 5px;
    }
    .brief-headlines .sq.gold { background: var(--gold); }
    .brief-headlines .sq.risk { background: var(--risk); }
    .brief-headlines b { font-weight: 600; }

    /* video slot */
    .video-slot {
      flex: 1;
      min-height: 0;
      padding: 14px 20px 18px;
      display: flex;
      flex-direction: column;
    }
    .video-frame {
      flex: 1;
      min-height: 0;
      background: linear-gradient(135deg, #1a2330 0%, #0f161f 100%);
      color: #fff;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 14px;
      position: relative;
      overflow: hidden;
      border: 1px solid #2a323c;
    }
    .video-frame::before {
      content: "";
      position: absolute;
      inset: 0;
      background: radial-gradient(circle at 30% 40%, rgba(13,128,108,0.18), transparent 50%),
                  radial-gradient(circle at 70% 70%, rgba(66,105,214,0.12), transparent 50%);
    }
    .video-frame video, .video-frame iframe {
      width: 100%; height: 100%; object-fit: cover;
      position: absolute; inset: 0;
    }
    .video-play {
      width: 48px; height: 48px;
      border-radius: 50%;
      background: rgba(255,255,255,0.1);
      border: 1.5px solid rgba(255,255,255,0.5);
      display: grid;
      place-items: center;
      z-index: 2;
    }
    .video-play::after {
      content: "";
      width: 0; height: 0;
      border-top: 8px solid transparent;
      border-bottom: 8px solid transparent;
      border-left: 12px solid #fff;
      margin-left: 3px;
    }
    .video-label {
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 0.16em;
      text-transform: uppercase;
      color: rgba(255,255,255,0.65);
      z-index: 2;
    }
    .video-sub {
      font-size: 12px;
      color: rgba(255,255,255,0.5);
      z-index: 2;
      text-align: center;
      max-width: 26ch;
      line-height: 1.4;
    }

    /* tabs */
    .tabs {
      display: flex;
      border-bottom: 1px solid var(--line);
      background: var(--paper);
    }
    .tab {
      flex: 1;
      padding: 12px 16px;
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--muted);
      cursor: pointer;
      border: 0;
      background: transparent;
      font-family: inherit;
      border-bottom: 2px solid transparent;
      transition: all 0.15s;
    }
    .tab.on {
      color: var(--ink);
      background: var(--surface);
      border-bottom-color: var(--ink);
    }
    .tab .badge {
      display: inline-block;
      margin-left: 6px;
      background: var(--gold);
      color: #fff;
      font-variant-numeric: tabular-nums;
      padding: 1px 6px;
      letter-spacing: 0;
      font-size: 10px;
    }

    /* empty states */
    .empty {
      padding: 36px 20px;
      text-align: center;
      color: var(--muted-2);
      font-size: 12px;
    }
    .empty .ec {
      font-size: 32px;
      color: var(--line);
      margin-bottom: 8px;
    }

    /* packet animation */
    .packet {
      position: absolute;
      width: auto;
      max-width: 180px;
      transform: translate(-50%, -50%);
      z-index: 4;
      pointer-events: none;
    }
    .packet-body {
      background: var(--ink);
      color: #fff;
      padding: 6px 10px;
      font-size: 11px;
      font-weight: 500;
      letter-spacing: 0.01em;
      line-height: 1.3;
      box-shadow: 0 8px 20px -6px rgba(17,22,29,0.4);
      white-space: nowrap;
      max-width: 220px;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .packet-body.green { background: var(--accent); }
    .packet-body.gold { background: var(--gold); }
    .packet-body.risk { background: var(--risk); }

    /* === scaled stage === */
    .v-fade-in { animation: fadeIn 0.3s ease-out; }
    @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
  </style>

  <style>
    /* site nav above the agent-ops canvas */
    .lx-sitenav {
      position: fixed; top: 0; left: 0; right: 0;
      height: 56px; z-index: 10;
      background: rgba(10, 13, 18, 0.92);
      backdrop-filter: blur(10px);
      border-bottom: 1px solid rgba(255,255,255,0.08);
      display: flex; align-items: center; gap: 18px;
      padding: 0 22px;
      color: #f6f7f4;
      font-family: Inter, system-ui, sans-serif;
    }
    .lx-sitenav .brand {
      display: inline-grid; place-items: center;
      width: 30px; height: 30px;
      border: 1.5px solid #f6f7f4;
      font-weight: 900; font-size: 12px;
    }
    .lx-sitenav .title {
      font-size: 13px; font-weight: 700;
      letter-spacing: 0.16em; text-transform: uppercase;
    }
    .lx-sitenav .sub { color: rgba(246,247,244,0.55); font-size: 13px; font-weight: 500; margin-left: 4px; }
    .lx-sitenav .spacer { flex: 1; }
    .lx-sitenav a {
      color: rgba(246,247,244,0.78);
      text-decoration: none;
      font-size: 12px; font-weight: 700;
      letter-spacing: 0.14em; text-transform: uppercase;
      padding: 8px 12px;
      border: 1px solid rgba(255,255,255,0.12);
    }
    .lx-sitenav a:hover { color: #fff; background: rgba(255,255,255,0.06); }

// ── useTweaks ───────────────────────────────────────────────────────────────
// Single source of truth for tweak values. setTweak persists via the host
// (__edit_mode_set_keys → host rewrites the EDITMODE block on disk).
function useTweaks(defaults) {
  const [values, setValues] = React.useState(defaults);
  // Accepts either setTweak('key', value) or setTweak({ key: value, ... }) so a
  // useState-style call doesn't write a "[object Object]" key into the persisted
  // JSON block.
  const setTweak = React.useCallback((keyOrEdits, val) => {
    const edits = typeof keyOrEdits === 'object' && keyOrEdits !== null
      ? keyOrEdits : { [keyOrEdits]: val };
    setValues((prev) => ({ ...prev, ...edits }));
    window.parent.postMessage({ type: '__edit_mode_set_keys', edits }, '*');
    // Same-window signal so in-page listeners (deck-stage rail thumbnails)
    // can react — the parent message only reaches the host, not peers.
    window.dispatchEvent(new CustomEvent('tweakchange', { detail: edits }));
  }, []);
  return [values, setTweak];
}

// ── TweaksPanel ─────────────────────────────────────────────────────────────
// Floating shell. Registers the protocol listener BEFORE announcing
// availability — if the announce ran first, the host's activate could land
// before our handler exists and the toolbar toggle would silently no-op.
// The close button posts __edit_mode_dismissed so the host's toolbar toggle
// flips off in lockstep; the host echoes __deactivate_edit_mode back which
// is what actually hides the panel.
function TweaksPanel({ title = 'Tweaks', children }) {
  const [open, setOpen] = React.useState(false);
  const dragRef = React.useRef(null);
  const offsetRef = React.useRef({ x: 16, y: 16 });
  const PAD = 16;

  const clampToViewport = React.useCallback(() => {
    const panel = dragRef.current;
    if (!panel) return;
    const w = panel.offsetWidth, h = panel.offsetHeight;
    const maxRight = Math.max(PAD, window.innerWidth - w - PAD);
    const maxBottom = Math.max(PAD, window.innerHeight - h - PAD);
    offsetRef.current = {
      x: Math.min(maxRight, Math.max(PAD, offsetRef.current.x)),
      y: Math.min(maxBottom, Math.max(PAD, offsetRef.current.y)),
    };
    panel.style.right = offsetRef.current.x + 'px';
    panel.style.bottom = offsetRef.current.y + 'px';
  }, []);

  React.useEffect(() => {
    if (!open) return;
    clampToViewport();
    if (typeof ResizeObserver === 'undefined') {
      window.addEventListener('resize', clampToViewport);
      return () => window.removeEventListener('resize', clampToViewport);
    }
    const ro = new ResizeObserver(clampToViewport);
    ro.observe(document.documentElement);
    return () => ro.disconnect();
  }, [open, clampToViewport]);

  React.useEffect(() => {
    const onMsg = (e) => {
      const t = e?.data?.type;
      if (t === '__activate_edit_mode') setOpen(true);
      else if (t === '__deactivate_edit_mode') setOpen(false);
    };
    window.addEventListener('message', onMsg);
    window.parent.postMessage({ type: '__edit_mode_available' }, '*');
    return () => window.removeEventListener('message', onMsg);
  }, []);

  const dismiss = () => {
    setOpen(false);
    window.parent.postMessage({ type: '__edit_mode_dismissed' }, '*');
  };

  const onDragStart = (e) => {
    const panel = dragRef.current;
    if (!panel) return;
    const r = panel.getBoundingClientRect();
    const sx = e.clientX, sy = e.clientY;
    const startRight = window.innerWidth - r.right;
    const startBottom = window.innerHeight - r.bottom;
    const move = (ev) => {
      offsetRef.current = {
        x: startRight - (ev.clientX - sx),
        y: startBottom - (ev.clientY - sy),
      };
      clampToViewport();
    };
    const up = () => {
      window.removeEventListener('mousemove', move);
      window.removeEventListener('mouseup', up);
    };
    window.addEventListener('mousemove', move);
    window.addEventListener('mouseup', up);
  };

  if (!open) return null;
  return (
    <>
      <style>{__TWEAKS_STYLE}</style>
      <div ref={dragRef} className="twk-panel" data-omelette-chrome=""
           style={{ right: offsetRef.current.x, bottom: offsetRef.current.y }}>
        <div className="twk-hd" onMouseDown={onDragStart}>
          <b>{title}</b>
          <button className="twk-x" aria-label="Close tweaks"
                  onMouseDown={(e) => e.stopPropagation()}
                  onClick={dismiss}>✕</button>
        </div>
        <div className="twk-body">
          {children}
        </div>
      </div>
    </>
  );
}

// ── Layout helpers ──────────────────────────────────────────────────────────

function TweakSection({ label, children }) {
  return (
    <>
      <div className="twk-sect">{label}</div>
      {children}
    </>
  );
}

function TweakRow({ label, value, children, inline = false }) {
  return (
    <div className={inline ? 'twk-row twk-row-h' : 'twk-row'}>
      <div className="twk-lbl">
        <span>{label}</span>
        {value != null && <span className="twk-val">{value}</span>}
      </div>
      {children}
    </div>
  );
}

// ── Controls ────────────────────────────────────────────────────────────────

function TweakSlider({ label, value, min = 0, max = 100, step = 1, unit = '', onChange }) {
  return (
    <TweakRow label={label} value={`${value}${unit}`}>
      <input type="range" className="twk-slider" min={min} max={max} step={step}
             value={value} onChange={(e) => onChange(Number(e.target.value))} />
    </TweakRow>
  );
}

function TweakToggle({ label, value, onChange }) {
  return (
    <div className="twk-row twk-row-h">
      <div className="twk-lbl"><span>{label}</span></div>
      <button type="button" className="twk-toggle" data-on={value ? '1' : '0'}
              role="switch" aria-checked={!!value}
              onClick={() => onChange(!value)}><i /></button>
    </div>
  );
}

function TweakRadio({ label, value, options, onChange }) {
  const trackRef = React.useRef(null);
  const [dragging, setDragging] = React.useState(false);
  // The active value is read by pointer-move handlers attached for the lifetime
  // of a drag — ref it so a stale closure doesn't fire onChange for every move.
  const valueRef = React.useRef(value);
  valueRef.current = value;

  // Segments wrap mid-word once per-segment width runs out. The track is
  // ~248px (280 panel − 28 body pad − 4 seg pad), each button loses 12px
  // to its own padding, and 11.5px system-ui averages ~6.3px/char — so 2
  // options fit ~16 chars each, 3 fit ~10. Past that (or >3 options), fall
  // back to a dropdown rather than wrap.
  const labelLen = (o) => String(typeof o === 'object' ? o.label : o).length;
  const maxLen = options.reduce((m, o) => Math.max(m, labelLen(o)), 0);
  const fitsAsSegments = maxLen <= ({ 2: 16, 3: 10 }[options.length] ?? 0);
  if (!fitsAsSegments) {
    // <select> emits strings — map back to the original option value so the
    // fallback stays type-preserving (numbers, booleans) like the segment path.
    const resolve = (s) => {
      const m = options.find((o) => String(typeof o === 'object' ? o.value : o) === s);
      return m === undefined ? s : typeof m === 'object' ? m.value : m;
    };
    return <TweakSelect label={label} value={value} options={options}
                        onChange={(s) => onChange(resolve(s))} />;
  }
  const opts = options.map((o) => (typeof o === 'object' ? o : { value: o, label: o }));
  const idx = Math.max(0, opts.findIndex((o) => o.value === value));
  const n = opts.length;

  const segAt = (clientX) => {
    const r = trackRef.current.getBoundingClientRect();
    const inner = r.width - 4;
    const i = Math.floor(((clientX - r.left - 2) / inner) * n);
    return opts[Math.max(0, Math.min(n - 1, i))].value;
  };

  const onPointerDown = (e) => {
    setDragging(true);
    const v0 = segAt(e.clientX);
    if (v0 !== valueRef.current) onChange(v0);
    const move = (ev) => {
      if (!trackRef.current) return;
      const v = segAt(ev.clientX);
      if (v !== valueRef.current) onChange(v);
    };
    const up = () => {
      setDragging(false);
      window.removeEventListener('pointermove', move);
      window.removeEventListener('pointerup', up);
    };
    window.addEventListener('pointermove', move);
    window.addEventListener('pointerup', up);
  };

  return (
    <TweakRow label={label}>
      <div ref={trackRef} role="radiogroup" onPointerDown={onPointerDown}
           className={dragging ? 'twk-seg dragging' : 'twk-seg'}>
        <div className="twk-seg-thumb"
             style={{ left: `calc(2px + ${idx} * (100% - 4px) / ${n})`,
                      width: `calc((100% - 4px) / ${n})` }} />
        {opts.map((o) => (
          <button key={o.value} type="button" role="radio" aria-checked={o.value === value}>
            {o.label}
          </button>
        ))}
      </div>
    </TweakRow>
  );
}

function TweakSelect({ label, value, options, onChange }) {
  return (
    <TweakRow label={label}>
      <select className="twk-field" value={value} onChange={(e) => onChange(e.target.value)}>
        {options.map((o) => {
          const v = typeof o === 'object' ? o.value : o;
          const l = typeof o === 'object' ? o.label : o;
          return <option key={v} value={v}>{l}</option>;
        })}
      </select>
    </TweakRow>
  );
}

function TweakText({ label, value, placeholder, onChange }) {
  return (
    <TweakRow label={label}>
      <input className="twk-field" type="text" value={value} placeholder={placeholder}
             onChange={(e) => onChange(e.target.value)} />
    </TweakRow>
  );
}

function TweakNumber({ label, value, min, max, step = 1, unit = '', onChange }) {
  const clamp = (n) => {
    if (min != null && n < min) return min;
    if (max != null && n > max) return max;
    return n;
  };
  const startRef = React.useRef({ x: 0, val: 0 });
  const onScrubStart = (e) => {
    e.preventDefault();
    startRef.current = { x: e.clientX, val: value };
    const decimals = (String(step).split('.')[1] || '').length;
    const move = (ev) => {
      const dx = ev.clientX - startRef.current.x;
      const raw = startRef.current.val + dx * step;
      const snapped = Math.round(raw / step) * step;
      onChange(clamp(Number(snapped.toFixed(decimals))));
    };
    const up = () => {
      window.removeEventListener('pointermove', move);
      window.removeEventListener('pointerup', up);
    };
    window.addEventListener('pointermove', move);
    window.addEventListener('pointerup', up);
  };
  return (
    <div className="twk-num">
      <span className="twk-num-lbl" onPointerDown={onScrubStart}>{label}</span>
      <input type="number" value={value} min={min} max={max} step={step}
             onChange={(e) => onChange(clamp(Number(e.target.value)))} />
      {unit && <span className="twk-num-unit">{unit}</span>}
    </div>
  );
}

// Relative-luminance contrast pick — checkmarks drawn over a swatch need to
// read on both #111 and #fafafa without per-option configuration. Hex input
// only (#rgb / #rrggbb); named or rgb()/hsl() colors fall through to "light".
function __twkIsLight(hex) {
  const h = String(hex).replace('#', '');
  const x = h.length === 3 ? h.replace(/./g, (c) => c + c) : h.padEnd(6, '0');
  const n = parseInt(x.slice(0, 6), 16);
  if (Number.isNaN(n)) return true;
  const r = (n >> 16) & 255, g = (n >> 8) & 255, b = n & 255;
  return r * 299 + g * 587 + b * 114 > 148000;
}

const __TwkCheck = ({ light }) => (
  <svg viewBox="0 0 14 14" aria-hidden="true">
    <path d="M3 7.2 5.8 10 11 4.2" fill="none" strokeWidth="2.2"
          strokeLinecap="round" strokeLinejoin="round"
          stroke={light ? 'rgba(0,0,0,.78)' : '#fff'} />
  </svg>
);

// TweakColor — curated color/palette picker. Each option is either a single
// hex string or an array of 1-5 hex strings; the card adapts — a lone color
// renders solid, a palette renders colors[0] as the hero (left ~2/3) with the
// rest stacked in a sharp column on the right. onChange emits the
// option in the shape it was passed (string stays string, array stays array).
// Without options it falls back to the native color input for back-compat.
function TweakColor({ label, value, options, onChange }) {
  if (!options || !options.length) {
    return (
      <div className="twk-row twk-row-h">
        <div className="twk-lbl"><span>{label}</span></div>
        <input type="color" className="twk-swatch" value={value}
               onChange={(e) => onChange(e.target.value)} />
      </div>
    );
  }
  // Native <input type=color> emits lowercase hex per the HTML spec, so
  // compare case-insensitively. String() guards JSON.stringify(undefined),
  // which returns the primitive undefined (no .toLowerCase).
  const key = (o) => String(JSON.stringify(o)).toLowerCase();
  const cur = key(value);
  return (
    <TweakRow label={label}>
      <div className="twk-chips" role="radiogroup">
        {options.map((o, i) => {
          const colors = Array.isArray(o) ? o : [o];
          const [hero, ...rest] = colors;
          const sup = rest.slice(0, 4);
          const on = key(o) === cur;
          return (
            <button key={i} type="button" className="twk-chip" role="radio"
                    aria-checked={on} data-on={on ? '1' : '0'}
                    aria-label={colors.join(', ')} title={colors.join(' · ')}
                    style={{ background: hero }}
                    onClick={() => onChange(o)}>
              {sup.length > 0 && (
                <span>
                  {sup.map((c, j) => <i key={j} style={{ background: c }} />)}
                </span>
              )}
              {on && <__TwkCheck light={__twkIsLight(hero)} />}
            </button>
          );
        })}
      </div>
    </TweakRow>
  );
}

function TweakButton({ label, onClick, secondary = false }) {
  return (
    <button type="button" className={secondary ? 'twk-btn secondary' : 'twk-btn'}
            onClick={onClick}>{label}</button>
  );
}

Object.assign(window, {
  useTweaks, TweaksPanel, TweakSection, TweakRow,
  TweakSlider, TweakToggle, TweakRadio, TweakSelect,
  TweakText, TweakNumber, TweakColor, TweakButton,
});

  <script type="text/babel" data-presets="env,react">
const { useState, useEffect, useRef, useMemo, useCallback } = React;

// ===== utility =====
const easeOutCubic = (t) => 1 - Math.pow(1 - t, 3);
const lerp = (a, b, t) => a + (b - a) * t;

function pad2(n) { return n < 10 ? '0' + n : '' + n; }
function formatClock(baseMs, vt) {
  // baseMs: real start, vt: virtual ms elapsed. Show time-of-day starting at 14:32:08.
  const totalSec = Math.floor((baseMs + vt) / 1000);
  const h = (Math.floor(totalSec / 3600)) % 24;
  const m = Math.floor((totalSec / 60) % 60);
  const s = totalSec % 60;
  return `${pad2(h)}:${pad2(m)}:${pad2(s)}`;
}
function formatLogTime(baseMs, vt) {
  return formatClock(baseMs, vt);
}

// ===== ticker (virtual clock) =====
function useTicker(paused, speed) {
  const [vt, setVt] = useState(0);
  useEffect(() => {
    let raf, last = performance.now();
    const loop = () => {
      const now = performance.now();
      const dt = Math.min(50, now - last); // clamp big gaps
      last = now;
      if (!paused) setVt(t => t + dt * speed);
      raf = requestAnimationFrame(loop);
    };
    raf = requestAnimationFrame(loop);
    return () => cancelAnimationFrame(raf);
  }, [paused, speed]);
  return vt;
}

// ===== top bar =====
function TopBar({ vt, paused, speed, onToggle, onSpeed, onReset, runningCount }) {
  // baseClock: 14:32:08
  const baseMs = (14 * 3600 + 32 * 60 + 8) * 1000;
  const clock = formatClock(baseMs, vt);
  return (
    <div className="topbar">
      <span className="brand">LX</span>
      <span className="crumb">
        Level Intelligence OS <i>·</i> Agent Operations
      </span>
      <span className="live">
        <span className="pulse"></span> live
      </span>
      {runningCount > 0 && (
        <span style={{ fontSize: 12, color: 'var(--muted)' }}>
          {runningCount} scenario{runningCount > 1 ? 's' : ''} running
        </span>
      )}
      <div className="ctrl-group">
        <span className="clock">{clock} <span style={{ color: 'var(--muted-2)', marginLeft: 6 }}>CDT</span></span>
        <button className="icon-btn" onClick={onToggle} title={paused ? 'Play' : 'Pause'}>
          {paused ? '▶' : '❚❚'}
        </button>
        {[0.5, 1, 2, 4].map(s => (
          <button key={s} className={'icon-btn' + (speed === s ? ' on' : '')} style={{ width: 38, fontSize: 11, fontWeight: 600 }} onClick={() => onSpeed(s)}>
            {s}×
          </button>
        ))}
        <button className="icon-btn" onClick={onReset} title="Reset" style={{ marginLeft: 8 }}>↺</button>
      </div>
    </div>
  );
}

// ===== scenarios row =====
function ScenarioRow({ onTrigger, runningIds }) {
  return (
    <div className="scenarios">
      <span className="label">Trigger</span>
      {SCENARIOS.map(sc => (
        <button
          key={sc.id}
          className={'scenario-btn' + (runningIds.includes(sc.id) ? ' active' : '')}
          onClick={() => onTrigger(sc)}
          title={sc.blurb}
        >
          <span className="play"></span>
          {sc.title}
        </button>
      ))}
      <div style={{ marginLeft: 'auto', fontSize: 11, color: 'var(--muted-2)', maxWidth: 320, textAlign: 'right', lineHeight: 1.4 }}>
        Click a trigger to start a scenario. Stack them to see the agents work in parallel.
      </div>
    </div>
  );
}

// ===== agent network =====
const NET_W = 1020;
const NET_H = 430;

function Edge({ a, b, active }) {
  return (
    <line
      x1={a.x} y1={a.y} x2={b.x} y2={b.y}
      stroke={active ? 'var(--accent)' : 'var(--line)'}
      strokeWidth={active ? 1.5 : 1}
      strokeDasharray={active ? '0' : '4 4'}
      opacity={active ? 0.9 : 0.6}
    />
  );
}

function AgentCard({ agent, state }) {
  const status = state?.status || 'idle';
  const task = state?.task || agent.idleTask;
  return (
    <div className="agent-node" style={{ left: agent.x, top: agent.y }}>
      <div className={'agent-card ' + status + (agent.human ? ' human' : '')}>
        <div className="agent-head">
          <span className="agent-dot"></span>
          <div style={{ flex: 1 }}>
            <div className="agent-name">{agent.name}</div>
            <div className="agent-role">{agent.role}</div>
          </div>
        </div>
        <div className={'agent-task' + (status === 'idle' ? ' idle' : '')}>{task}</div>
      </div>
    </div>
  );
}

function Packet({ packet, vt }) {
  const { from, to, label, tone, startVt, duration } = packet;
  const t = Math.max(0, Math.min(1, (vt - startVt) / duration));
  const e = easeOutCubic(t);
  // slight arc: bend perpendicular by sin(πt) * amount
  const dx = to.x - from.x, dy = to.y - from.y;
  const len = Math.sqrt(dx * dx + dy * dy);
  const nx = -dy / len, ny = dx / len;
  const bend = Math.min(30, len * 0.08);
  const cx = lerp(from.x, to.x, e) + nx * bend * Math.sin(Math.PI * t);
  const cy = lerp(from.y, to.y, e) + ny * bend * Math.sin(Math.PI * t);
  // fade in/out at ends
  let opacity = 1;
  if (t < 0.12) opacity = t / 0.12;
  else if (t > 0.85) opacity = (1 - t) / 0.15;
  return (
    <div className="packet" style={{ left: cx, top: cy, opacity }}>
      <div className={'packet-body' + (tone && tone !== 'default' ? ' ' + tone : '')}>{label}</div>
    </div>
  );
}

function Network({ agentStates, activePackets, vt }) {
  // active edge set: any edge with a packet on it (either direction)
  const activeEdges = useMemo(() => {
    const s = new Set();
    activePackets.forEach(p => {
      s.add(p.fromId + '|' + p.toId);
      s.add(p.toId + '|' + p.fromId);
    });
    return s;
  }, [activePackets]);

  return (
    <div className="network">
      <div className="net-title">Agent network</div>
      <div className="net-stats">
        <span><b>{Object.values(agentStates).filter(s => s.status === 'working').length}</b> working</span>
        <span><b>{Object.values(agentStates).filter(s => s.status === 'awaiting').length}</b> awaiting</span>
        <span><b>{activePackets.length}</b> in flight</span>
      </div>

      <svg className="edges" viewBox={`0 0 ${NET_W} ${NET_H}`} preserveAspectRatio="none" style={{ width: '100%', height: '100%' }}>
        {EDGES.map(([aId, bId], i) => {
          const a = AGENTS[aId], b = AGENTS[bId];
          const active = activeEdges.has(aId + '|' + bId);
          return <Edge key={i} a={a} b={b} active={active} />;
        })}
      </svg>

      <div className="packets">
        {activePackets.map(p => (
          <Packet
            key={p.id}
            vt={vt}
            packet={{
              from: AGENTS[p.fromId],
              to: AGENTS[p.toId],
              label: p.label,
              tone: p.tone,
              startVt: p.startVt,
              duration: p.duration,
            }}
          />
        ))}
      </div>

      {Object.values(AGENTS).map(agent => (
        <AgentCard key={agent.id} agent={agent} state={agentStates[agent.id]} />
      ))}
    </div>
  );
}

// ===== log =====
function LogEntry({ entry, baseMs }) {
  const from = AGENTS[entry.from];
  const fromName = from ? from.name : (entry.from === 'system' ? 'System' : entry.from);
  return (
    <div className={'log-entry event-' + (entry.level || 'info')}>
      <div className="log-time">{formatLogTime(baseMs, entry.atVt)}</div>
      <div className="log-from">{fromName}</div>
      <div className="log-msg" dangerouslySetInnerHTML={{ __html: entry.msg }}></div>
    </div>
  );
}

function LogPanel({ log, baseMs }) {
  const bodyRef = useRef(null);
  useEffect(() => {
    if (bodyRef.current) {
      bodyRef.current.scrollTop = bodyRef.current.scrollHeight;
    }
  }, [log.length]);

  return (
    <div className="log-wrap">
      <div className="log-head">
        <span className="label">Activity stream</span>
        <span className="count">{log.length} events</span>
      </div>
      <div className="log-body" ref={bodyRef}>
        {log.length === 0 ? (
          <div className="empty">
            <div className="ec">—</div>
            No activity yet. Trigger a scenario above to see the agents work.
          </div>
        ) : (
          log.map(e => <LogEntry key={e.id} entry={e} baseMs={baseMs} />)
        )}
      </div>
    </div>
  );
}

// ===== main app =====
function App() {
  const [paused, setPaused] = useState(false);
  const [speed, setSpeed] = useState(1);
  const vt = useTicker(paused, speed);

  // agent states
  const [agentStates, setAgentStates] = useState(() => {
    const o = {};
    Object.values(AGENTS).forEach(a => { o[a.id] = { status: 'idle', task: a.idleTask }; });
    return o;
  });
  const [log, setLog] = useState([]);
  const [packets, setPackets] = useState([]);
  const [approvals, setApprovals] = useState([]);
  const [briefStats, setBriefStats] = useState({ signals: 0, rfqs: 0, approvals: 0, stuck: 0 });

  const runningRef = useRef([]); // {scenarioId, startedVt, nextIdx}
  const [runningIds, setRunningIds] = useState([]);
  const eventIdRef = useRef(0);
  const nextEventId = () => ++eventIdRef.current;

  // apply a step to the state
  const applyStep = useCallback((step, atVt) => {
    switch (step.kind) {
      case 'set':
        setAgentStates(s => ({
          ...s,
          [step.agent]: {
            status: step.status,
            task: step.task !== undefined ? step.task : s[step.agent].task,
          },
        }));
        break;
      case 'send': {
        const fromA = AGENTS[step.from], toA = AGENTS[step.to];
        if (!fromA || !toA) break;
        const duration = 1100; // virtual ms
        const id = 'pk-' + nextEventId();
        setPackets(p => [...p, { id, fromId: step.from, toId: step.to, label: step.label, tone: step.tone || 'default', startVt: atVt, duration }]);
        // auto-remove after duration
        setTimeout(() => {
          setPackets(p => p.filter(x => x.id !== id));
        }, (duration / speed) + 100);
        break;
      }
      case 'log':
        setLog(l => [...l, { id: 'lg-' + nextEventId(), atVt, from: step.from, msg: step.msg, level: step.level }]);
        break;
      case 'approval':
        setApprovals(a => {
          if (a.some(x => x.id === step.approval.id)) return a;
          return [...a, step.approval];
        });
        break;
      case 'brief':
        setBriefStats(b => ({ ...b, ...step }));
        break;
    }
  }, [speed]);

  // process timeline each tick
  const lastVtRef = useRef(0);
  useEffect(() => {
    if (runningRef.current.length === 0) { lastVtRef.current = vt; return; }
    let changed = false;
    runningRef.current = runningRef.current.filter(r => {
      const sc = SCENARIOS.find(x => x.id === r.scenarioId);
      while (r.nextIdx < sc.steps.length && sc.steps[r.nextIdx].at + r.startedVt <= vt) {
        applyStep(sc.steps[r.nextIdx], sc.steps[r.nextIdx].at + r.startedVt);
        r.nextIdx++;
      }
      const stillRunning = r.nextIdx < sc.steps.length;
      if (!stillRunning) changed = true;
      return stillRunning;
    });
    if (changed) setRunningIds(runningRef.current.map(r => r.scenarioId));
    lastVtRef.current = vt;
  }, [vt, applyStep]);

  const triggerScenario = (sc) => {
    // if it's the same and already running, allow re-trigger (queue)
    runningRef.current.push({ scenarioId: sc.id, startedVt: vt, nextIdx: 0 });
    setRunningIds(runningRef.current.map(r => r.scenarioId));
  };

  const resolveApproval = (id) => {
    setApprovals(a => a.filter(x => x.id !== id));
    setLog(l => [...l, { id: 'lg-' + nextEventId(), atVt: vt, from: 'human', msg: '<b>Approved</b> · ' + id, level: 'decide' }]);
    setAgentStates(s => {
      const remaining = approvals.length - 1;
      return {
        ...s,
        human: {
          status: remaining > 0 ? 'awaiting' : 'idle',
          task: remaining > 0 ? `${remaining} approval${remaining !== 1 ? 's' : ''} waiting` : 'Mailbox at zero',
        },
      };
    });
  };

  const reset = () => {
    runningRef.current = [];
    setRunningIds([]);
    setLog([]);
    setPackets([]);
    setApprovals([]);
    setBriefStats({ signals: 0, rfqs: 0, approvals: 0, stuck: 0 });
    const o = {};
    Object.values(AGENTS).forEach(a => { o[a.id] = { status: 'idle', task: a.idleTask }; });
    setAgentStates(o);
  };

  // tweaks
  const [tweaks, setTweak] = TweaksPanelLib.useTweaks(/*EDITMODE-BEGIN*/{
    "showTweaks": true,
    "videoSrc": "",
    "autoplay": "off"
  }/*EDITMODE-END*/);

  // autoplay: cycle scenarios on launch (for demo)
  useEffect(() => {
    if (tweaks.autoplay === 'on') {
      const timers = [];
      timers.push(setTimeout(() => triggerScenario(SCEN_PERMIT), 600));
      timers.push(setTimeout(() => triggerScenario(SCEN_RFQ), 4000));
      timers.push(setTimeout(() => triggerScenario(SCEN_BROKER), 11000));
      timers.push(setTimeout(() => triggerScenario(SCEN_BRIEF), 16000));
      return () => timers.forEach(clearTimeout);
    }
  }, [tweaks.autoplay]);

  return (
    <>
      <TopBar
        vt={vt}
        paused={paused}
        speed={speed}
        onToggle={() => setPaused(p => !p)}
        onSpeed={setSpeed}
        onReset={reset}
        runningCount={runningIds.length}
      />
      <ScenarioRow onTrigger={triggerScenario} runningIds={runningIds} />
      <div className="main">
        <div className="col-left">
          <Network agentStates={agentStates} activePackets={packets} vt={vt} />
          <LogPanel log={log} baseMs={(14 * 3600 + 32 * 60 + 8) * 1000} />
        </div>
        <RightColumn
          approvals={approvals}
          briefStats={briefStats}
          videoSrc={tweaks.videoSrc}
          onResolve={resolveApproval}
        />
      </div>

      <TweaksPanelLib.TweaksPanel title="Tweaks">
        <TweaksPanelLib.TweakSection title="Demo">
          <TweaksPanelLib.TweakRadio
            label="Autoplay scenarios"
            value={tweaks.autoplay}
            onChange={(v) => setTweak('autoplay', v)}
            options={['off', 'on']}
          />
          <div style={{ fontSize: 11, color: 'var(--muted)', lineHeight: 1.4, marginTop: 4 }}>
            On → automatically stacks all four scenarios on load to show the system in motion.
          </div>
        </TweaksPanelLib.TweakSection>
        <TweaksPanelLib.TweakSection title="Video">
          <TweaksPanelLib.TweakText
            label="Walkthrough video URL"
            value={tweaks.videoSrc}
            onChange={(v) => setTweak('videoSrc', v)}
            placeholder="Paste Higgsfield .mp4 URL"
          />
          <div style={{ fontSize: 11, color: 'var(--muted)', lineHeight: 1.4, marginTop: 4 }}>
            Drop your Higgsfield mp4 link into the URL field. Or upload to the project and paste the filename.
          </div>
        </TweaksPanelLib.TweakSection>
      </TweaksPanelLib.TweaksPanel>
    </>
  );
}

// the tweaks-panel.jsx file exposes things on window via Object.assign — gather them under a namespace
const TweaksPanelLib = {
  useTweaks: window.useTweaks,
  TweaksPanel: window.TweaksPanel,
  TweakSection: window.TweakSection,
  TweakRadio: window.TweakRadio,
  TweakText: window.TweakText,
  TweakSlider: window.TweakSlider,
  TweakToggle: window.TweakToggle,
};

const root = ReactDOM.createRoot(document.getElementById('canvas'));
root.render(<App />);

</script>
