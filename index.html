<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta http-equiv="refresh" content="0; url=publish/index.html">
  <link rel="canonical" href="publish/index.html">
  <title>Level Intelligence OS</title>
  <style>
    :root {
      color-scheme: light;
      --ink: #121820;
      --muted: #5b6775;
      --paper: #f7f7f4;
      --line: #d8dde3;
      --dark: #17202b;
    }

    * {
      box-sizing: border-box;
    }

    body {
      min-height: 100svh;
      margin: 0;
      display: grid;
      place-items: center;
      color: var(--ink);
      background: var(--paper);
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }

    main {
      width: min(92vw, 520px);
      padding: 34px;
      border: 1px solid var(--line);
      background: #fff;
    }

    .mark {
      width: 42px;
      height: 42px;
      margin-bottom: 22px;
      display: grid;
      place-items: center;
      border: 2px solid var(--ink);
      font-weight: 850;
    }

    h1 {
      margin: 0;
      font-size: 32px;
      line-height: 1;
      letter-spacing: 0;
    }

    p {
      margin: 16px 0 0;
      color: var(--muted);
      line-height: 1.5;
    }

    a {
      display: inline-flex;
      align-items: center;
      min-height: 42px;
      margin-top: 22px;
      padding: 0 15px;
      color: #fff;
      background: var(--dark);
      border: 1px solid var(--dark);
      text-decoration: none;
      font-size: 13px;
      font-weight: 800;
    }
  </style>
</head>
<body>
  <main>
    <div class="mark">LX</div>
    <h1>Level Intelligence OS</h1>
    <p>Opening the client proposal package.</p>
    <a href="publish/index.html">Open package</a>
  </main>
</body>
</html>
