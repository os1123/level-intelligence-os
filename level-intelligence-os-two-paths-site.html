  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>

    *, *::before, *::after { box-sizing: border-box; }

<body>
  <div id="root"></div>

  <!-- animations.jsx (inlined) -->
  <script type="text/babel" data-presets="env,react">

// animations.jsx
// Reusable animation starter: Stage, Timeline, Sprite, easing helpers.
// Usage (in an HTML file that loads React + Babel):
//
//   <Stage width={1280} height={720} duration={10} background="#f6f4ef">
//     <MyScene />
//   </Stage>
//
// Inside <Stage>, any child can call useTime() to read the current
// playhead (seconds). Or wrap content in <Sprite start={1} end={4}>...</Sprite>
// to only render during that window -- children receive a `localTime` and
// `progress` via the useSprite() hook.
//
// ─────────────────────────────────────────────────────────────────────────────

// ── Easing functions (hand-rolled, Popmotion-style) ─────────────────────────
// All easings take t ∈ [0,1] and return eased t ∈ [0,1] (may overshoot for back/elastic).
const Easing = {
  linear: (t) => t,

  // Quad
  easeInQuad:    (t) => t * t,
  easeOutQuad:   (t) => t * (2 - t),
  easeInOutQuad: (t) => (t < 0.5 ? 2 * t * t : -1 + (4 - 2 * t) * t),

  // Cubic
  easeInCubic:    (t) => t * t * t,
  easeOutCubic:   (t) => (--t) * t * t + 1,
  easeInOutCubic: (t) => (t < 0.5 ? 4 * t * t * t : (t - 1) * (2 * t - 2) * (2 * t - 2) + 1),

  // Quart
  easeInQuart:    (t) => t * t * t * t,
  easeOutQuart:   (t) => 1 - (--t) * t * t * t,
  easeInOutQuart: (t) => (t < 0.5 ? 8 * t * t * t * t : 1 - 8 * (--t) * t * t * t),

  // Expo
  easeInExpo:  (t) => (t === 0 ? 0 : Math.pow(2, 10 * (t - 1))),
  easeOutExpo: (t) => (t === 1 ? 1 : 1 - Math.pow(2, -10 * t)),
  easeInOutExpo: (t) => {
    if (t === 0) return 0;
    if (t === 1) return 1;
    if (t < 0.5) return 0.5 * Math.pow(2, 20 * t - 10);
    return 1 - 0.5 * Math.pow(2, -20 * t + 10);
  },

  // Sine
  easeInSine:    (t) => 1 - Math.cos((t * Math.PI) / 2),
  easeOutSine:   (t) => Math.sin((t * Math.PI) / 2),
  easeInOutSine: (t) => -(Math.cos(Math.PI * t) - 1) / 2,

  // Back (overshoot)
  easeOutBack: (t) => {
    const c1 = 1.70158, c3 = c1 + 1;
    return 1 + c3 * Math.pow(t - 1, 3) + c1 * Math.pow(t - 1, 2);
  },
  easeInBack: (t) => {
    const c1 = 1.70158, c3 = c1 + 1;
    return c3 * t * t * t - c1 * t * t;
  },
  easeInOutBack: (t) => {
    const c1 = 1.70158, c2 = c1 * 1.525;
    return t < 0.5
      ? (Math.pow(2 * t, 2) * ((c2 + 1) * 2 * t - c2)) / 2
      : (Math.pow(2 * t - 2, 2) * ((c2 + 1) * (t * 2 - 2) + c2) + 2) / 2;
  },

  // Elastic
  easeOutElastic: (t) => {
    const c4 = (2 * Math.PI) / 3;
    if (t === 0) return 0;
    if (t === 1) return 1;
    return Math.pow(2, -10 * t) * Math.sin((t * 10 - 0.75) * c4) + 1;
  },
};

// ── Core interpolation helpers ──────────────────────────────────────────────

// Clamp a value to [min, max]
const clamp = (v, min, max) => Math.max(min, Math.min(max, v));

// interpolate([0, 0.5, 1], [0, 100, 50], ease?) -> fn(t)
// Popmotion-style: linearly maps t across input keyframes to output values,
// with optional easing per segment (single fn or array of fns).
function interpolate(input, output, ease = Easing.linear) {
  return (t) => {
    if (t <= input[0]) return output[0];
    if (t >= input[input.length - 1]) return output[output.length - 1];
    for (let i = 0; i < input.length - 1; i++) {
      if (t >= input[i] && t <= input[i + 1]) {
        const span = input[i + 1] - input[i];
        const local = span === 0 ? 0 : (t - input[i]) / span;
        const easeFn = Array.isArray(ease) ? (ease[i] || Easing.linear) : ease;
        const eased = easeFn(local);
        return output[i] + (output[i + 1] - output[i]) * eased;
      }
    }
    return output[output.length - 1];
  };
}

// animate({from, to, start, end, ease})(t) — simpler single-segment tween.
// Returns `from` before `start`, `to` after `end`.
function animate({ from = 0, to = 1, start = 0, end = 1, ease = Easing.easeInOutCubic }) {
  return (t) => {
    if (t <= start) return from;
    if (t >= end) return to;
    const local = (t - start) / (end - start);
    return from + (to - from) * ease(local);
  };
}

// ── Timeline context ────────────────────────────────────────────────────────

const TimelineContext = React.createContext({ time: 0, duration: 10, playing: false });

const useTime = () => React.useContext(TimelineContext).time;
const useTimeline = () => React.useContext(TimelineContext);

// ── Sprite ──────────────────────────────────────────────────────────────────
// Renders children only when the playhead is inside [start, end]. Provides
// a sub-context with `localTime` (seconds since start) and `progress` (0..1).
//
//   <Sprite start={2} end={5}>
//     {({ localTime, progress }) => <Thing x={progress * 100} />}
//   </Sprite>
//
// Or as a plain wrapper — children can call useSprite() themselves.

const SpriteContext = React.createContext({ localTime: 0, progress: 0, duration: 0 });
const useSprite = () => React.useContext(SpriteContext);

function Sprite({ start = 0, end = Infinity, children, keepMounted = false }) {
  const { time } = useTimeline();
  const visible = time >= start && time <= end;
  if (!visible && !keepMounted) return null;

  const duration = end - start;
  const localTime = Math.max(0, time - start);
  const progress = duration > 0 && isFinite(duration)
    ? clamp(localTime / duration, 0, 1)
    : 0;

  const value = { localTime, progress, duration, visible };

  return (
    <SpriteContext.Provider value={value}>
      {typeof children === 'function' ? children(value) : children}
    </SpriteContext.Provider>
  );
}

// ── Sample sprite components ────────────────────────────────────────────────

// TextSprite: fades/slides text in on entry, holds, then fades out on exit.
// Props: text, x, y, size, color, font, entryDur, exitDur, align
function TextSprite({
  text,
  x = 0, y = 0,
  size = 48,
  color = '#111',
  font = 'Inter, system-ui, sans-serif',
  weight = 600,
  entryDur = 0.45,
  exitDur = 0.35,
  entryEase = Easing.easeOutBack,
  exitEase = Easing.easeInCubic,
  align = 'left',
  letterSpacing = '-0.01em',
}) {
  const { localTime, duration } = useSprite();
  const exitStart = Math.max(0, duration - exitDur);

  let opacity = 1;
  let ty = 0;

  if (localTime < entryDur) {
    const t = entryEase(clamp(localTime / entryDur, 0, 1));
    opacity = t;
    ty = (1 - t) * 16;
  } else if (localTime > exitStart) {
    const t = exitEase(clamp((localTime - exitStart) / exitDur, 0, 1));
    opacity = 1 - t;
    ty = -t * 8;
  }

  const translateX = align === 'center' ? '-50%' : align === 'right' ? '-100%' : '0';

  return (
    <div style={{
      position: 'absolute',
      left: x, top: y,
      transform: `translate(${translateX}, ${ty}px)`,
      opacity,
      fontFamily: font,
      fontSize: size,
      fontWeight: weight,
      color,
      letterSpacing,
      whiteSpace: 'pre',
      lineHeight: 1.1,
      willChange: 'transform, opacity',
    }}>
      {text}
    </div>
  );
}

// ImageSprite: scales + fades in; optional Ken Burns drift during hold.
function ImageSprite({
  src,
  x = 0, y = 0,
  width = 400, height = 300,
  entryDur = 0.6,
  exitDur = 0.4,
  kenBurns = false,
  kenBurnsScale = 1.08,
  radius = 12,
  fit = 'cover',
  placeholder = null, // {label: string} for striped placeholder
}) {
  const { localTime, duration } = useSprite();
  const exitStart = Math.max(0, duration - exitDur);

  let opacity = 1;
  let scale = 1;

  if (localTime < entryDur) {
    const t = Easing.easeOutCubic(clamp(localTime / entryDur, 0, 1));
    opacity = t;
    scale = 0.96 + 0.04 * t;
  } else if (localTime > exitStart) {
    const t = Easing.easeInCubic(clamp((localTime - exitStart) / exitDur, 0, 1));
    opacity = 1 - t;
    scale = (kenBurns ? kenBurnsScale : 1) + 0.02 * t;
  } else if (kenBurns) {
    const holdSpan = exitStart - entryDur;
    const holdT = holdSpan > 0 ? (localTime - entryDur) / holdSpan : 0;
    scale = 1 + (kenBurnsScale - 1) * holdT;
  }

  const content = placeholder ? (
    <div style={{
      width: '100%', height: '100%',
      display: 'flex', alignItems: 'center', justifyContent: 'center',
      background: 'repeating-linear-gradient(135deg, #e9e6df 0 10px, #dcd8cf 10px 20px)',
      color: '#6b6458',
      fontFamily: 'JetBrains Mono, ui-monospace, monospace',
      fontSize: 13,
      letterSpacing: '0.04em',
      textTransform: 'uppercase',
    }}>
      {placeholder.label || 'image'}
    </div>
  ) : (
    <img src={src} alt="" style={{ width: '100%', height: '100%', objectFit: fit, display: 'block' }} />
  );

  return (
    <div style={{
      position: 'absolute',
      left: x, top: y,
      width, height,
      opacity,
      transform: `scale(${scale})`,
      transformOrigin: 'center',
      borderRadius: radius,
      overflow: 'hidden',
      willChange: 'transform, opacity',
    }}>
      {content}
    </div>
  );
}

// RectSprite: simple rectangle that animates position/size/color via props.
// Useful demo primitive — takes a `render` fn for per-frame customization.
function RectSprite({
  x = 0, y = 0,
  width = 100, height = 100,
  color = '#111',
  radius = 8,
  entryDur = 0.4,
  exitDur = 0.3,
  render, // optional: (ctx) => style overrides
}) {
  const spriteCtx = useSprite();
  const { localTime, duration } = spriteCtx;
  const exitStart = Math.max(0, duration - exitDur);

  let opacity = 1;
  let scale = 1;

  if (localTime < entryDur) {
    const t = Easing.easeOutBack(clamp(localTime / entryDur, 0, 1));
    opacity = clamp(localTime / entryDur, 0, 1);
    scale = 0.4 + 0.6 * t;
  } else if (localTime > exitStart) {
    const t = Easing.easeInQuad(clamp((localTime - exitStart) / exitDur, 0, 1));
    opacity = 1 - t;
    scale = 1 - 0.15 * t;
  }

  const overrides = render ? render(spriteCtx) : {};

  return (
    <div style={{
      position: 'absolute',
      left: x, top: y,
      width, height,
      background: color,
      borderRadius: radius,
      opacity,
      transform: `scale(${scale})`,
      transformOrigin: 'center',
      willChange: 'transform, opacity',
      ...overrides,
    }} />
  );
}


function Stage({
  width = 1280,
  height = 720,
  duration = 10,
  background = '#f6f4ef',
  fps = 60,
  loop = true,
  autoplay = true,
  persistKey = 'animstage',
  children,
}) {
  const [time, setTime] = React.useState(() => {
    try {
      const v = parseFloat(localStorage.getItem(persistKey + ':t') || '0');
      return isFinite(v) ? clamp(v, 0, duration) : 0;
    } catch { return 0; }
  });
  const [playing, setPlaying] = React.useState(autoplay);
  const [hoverTime, setHoverTime] = React.useState(null);
  const [scale, setScale] = React.useState(1);

  const stageRef = React.useRef(null);
  const canvasRef = React.useRef(null);
  const rafRef = React.useRef(null);
  const lastTsRef = React.useRef(null);

  // Persist playhead
  React.useEffect(() => {
    try { localStorage.setItem(persistKey + ':t', String(time)); } catch {}
  }, [time, persistKey]);

  // Auto-scale to fit viewport
  React.useEffect(() => {
    if (!stageRef.current) return;
    const el = stageRef.current;
    const measure = () => {
      const barH = 44; // playback bar height
      const s = Math.min(
        el.clientWidth / width,
        (el.clientHeight - barH) / height
      );
      setScale(Math.max(0.05, s));
    };
    measure();
    const ro = new ResizeObserver(measure);
    ro.observe(el);
    window.addEventListener('resize', measure);
    return () => {
      ro.disconnect();
      window.removeEventListener('resize', measure);
    };
  }, [width, height]);

  // Animation loop
  React.useEffect(() => {
    if (!playing) {
      lastTsRef.current = null;
      return;
    }
    const step = (ts) => {
      if (lastTsRef.current == null) lastTsRef.current = ts;
      const dt = (ts - lastTsRef.current) / 1000;
      lastTsRef.current = ts;
      setTime((t) => {
        let next = t + dt;
        if (next >= duration) {
          if (loop) next = next % duration;
          else { next = duration; setPlaying(false); }
        }
        return next;
      });
      rafRef.current = requestAnimationFrame(step);
    };
    rafRef.current = requestAnimationFrame(step);
    return () => {
      if (rafRef.current) cancelAnimationFrame(rafRef.current);
      lastTsRef.current = null;
    };
  }, [playing, duration, loop]);

  // Keyboard: space = play/pause, ← → = seek
  React.useEffect(() => {
    const onKey = (e) => {
      if (e.target && (e.target.tagName === 'INPUT' || e.target.tagName === 'TEXTAREA')) return;
      if (e.code === 'Space') {
        e.preventDefault();
        setPlaying(p => !p);
      } else if (e.code === 'ArrowLeft') {
        setTime(t => clamp(t - (e.shiftKey ? 1 : 0.1), 0, duration));
      } else if (e.code === 'ArrowRight') {
        setTime(t => clamp(t + (e.shiftKey ? 1 : 0.1), 0, duration));
      } else if (e.key === '0' || e.code === 'Home') {
        setTime(0);
      }
    };
    window.addEventListener('keydown', onKey);
    return () => window.removeEventListener('keydown', onKey);
  }, [duration]);

  const displayTime = hoverTime != null ? hoverTime : time;

  const ctxValue = React.useMemo(
    () => ({ time: displayTime, duration, playing, setTime, setPlaying }),
    [displayTime, duration, playing]
  );

  return (
    <div
      ref={stageRef}
      style={{
        position: 'absolute', inset: 0,
        display: 'flex', flexDirection: 'column',
        alignItems: 'center',
        background: '#0a0a0a',
        fontFamily: 'Inter, system-ui, sans-serif',
      }}
    >
      {/* Canvas area — vertically centered in remaining space */}
      <div style={{
        flex: 1,
        width: '100%',
        display: 'flex', alignItems: 'center', justifyContent: 'center',
        overflow: 'hidden',
        minHeight: 0,
      }}>
        <div
          ref={canvasRef}
          style={{
            width, height,
            background,
            position: 'relative',
            transform: `scale(${scale})`,
            transformOrigin: 'center',
            flexShrink: 0,
            boxShadow: '0 20px 60px rgba(0,0,0,0.4)',
            overflow: 'hidden',
          }}
        >
          <TimelineContext.Provider value={ctxValue}>
            {children}
          </TimelineContext.Provider>
        </div>
      </div>

      {/* Playback bar — stacked below canvas, never overlapping */}
      <PlaybackBar
        time={displayTime}
        actualTime={time}
        duration={duration}
        playing={playing}
        onPlayPause={() => setPlaying(p => !p)}
        onReset={() => { setTime(0); }}
        onSeek={(t) => setTime(t)}
        onHover={(t) => setHoverTime(t)}
      />
    </div>
  );
}

// ── Playback bar ────────────────────────────────────────────────────────────
// Play/pause, return-to-begin, scrub track, time display.
// Uses fixed-width time fields so layout doesn't thrash.

function PlaybackBar({ time, duration, playing, onPlayPause, onReset, onSeek, onHover }) {
  const trackRef = React.useRef(null);
  const [dragging, setDragging] = React.useState(false);

  const timeFromEvent = React.useCallback((e) => {
    const rect = trackRef.current.getBoundingClientRect();
    const x = clamp((e.clientX - rect.left) / rect.width, 0, 1);
    return x * duration;
  }, [duration]);

  const onTrackMove = (e) => {
    if (!trackRef.current) return;
    const t = timeFromEvent(e);
    if (dragging) {
      onSeek(t);
    } else {
      onHover(t);
    }
  };

  const onTrackLeave = () => {
    if (!dragging) onHover(null);
  };

  const onTrackDown = (e) => {
    setDragging(true);
    const t = timeFromEvent(e);
    onSeek(t);
    onHover(null);
  };

  React.useEffect(() => {
    if (!dragging) return;
    const onUp = () => setDragging(false);
    const onMove = (e) => {
      if (!trackRef.current) return;
      const t = timeFromEvent(e);
      onSeek(t);
    };
    window.addEventListener('mouseup', onUp);
    window.addEventListener('mousemove', onMove);
    return () => {
      window.removeEventListener('mouseup', onUp);
      window.removeEventListener('mousemove', onMove);
    };
  }, [dragging, timeFromEvent, onSeek]);

  const pct = duration > 0 ? (time / duration) * 100 : 0;
  const fmt = (t) => {
    const total = Math.max(0, t);
    const m = Math.floor(total / 60);
    const s = Math.floor(total % 60);
    const cs = Math.floor((total * 100) % 100);
    return `${String(m).padStart(1, '0')}:${String(s).padStart(2, '0')}.${String(cs).padStart(2, '0')}`;
  };

  const mono = 'JetBrains Mono, ui-monospace, SFMono-Regular, monospace';

  return (
    <div style={{
      display: 'flex', alignItems: 'center', gap: 12,
      padding: '8px 16px',
      background: 'rgba(20,20,20,0.92)',
      borderTop: '1px solid rgba(255,255,255,0.08)',
      width: '100%',
      maxWidth: 680,
      alignSelf: 'center',

      borderRadius: 8,
      color: '#f6f4ef',
      fontFamily: 'Inter, system-ui, sans-serif',
      userSelect: 'none',
      flexShrink: 0,
    }}>
      <IconButton onClick={onReset} title="Return to start (0)">
        <svg width="14" height="14" viewBox="0 0 14 14" fill="none">
          <path d="M3 2v10M12 2L5 7l7 5V2z" stroke="currentColor" strokeWidth="1.5" strokeLinejoin="round" strokeLinecap="round"/>
        </svg>
      </IconButton>
      <IconButton onClick={onPlayPause} title="Play/pause (space)">
        {playing ? (
          <svg width="14" height="14" viewBox="0 0 14 14" fill="none">
            <rect x="3" y="2" width="3" height="10" fill="currentColor"/>
            <rect x="8" y="2" width="3" height="10" fill="currentColor"/>
          </svg>
        ) : (
          <svg width="14" height="14" viewBox="0 0 14 14" fill="none">
            <path d="M3 2l9 5-9 5V2z" fill="currentColor"/>
          </svg>
        )}
      </IconButton>

      {/* Current time: fixed width so it doesn't thrash */}
      <div style={{
        fontFamily: mono,
        fontSize: 12,
        fontVariantNumeric: 'tabular-nums',
        width: 64, textAlign: 'right',
        color: '#f6f4ef',
      }}>
        {fmt(time)}
      </div>

      {/* Scrub track */}
      <div
        ref={trackRef}
        onMouseMove={onTrackMove}
        onMouseLeave={onTrackLeave}
        onMouseDown={onTrackDown}
        style={{
          flex: 1,
          height: 22,
          position: 'relative',
          cursor: 'pointer',
          display: 'flex', alignItems: 'center',
        }}
      >
        <div style={{
          position: 'absolute',
          left: 0, right: 0, height: 4,
          background: 'rgba(255,255,255,0.12)',
          borderRadius: 2,
        }}/>
        <div style={{
          position: 'absolute',
          left: 0, width: `${pct}%`, height: 4,
          background: 'oklch(72% 0.12 250)',
          borderRadius: 2,
        }}/>
        <div style={{
          position: 'absolute',
          left: `${pct}%`, top: '50%',
          width: 12, height: 12,
          marginLeft: -6, marginTop: -6,
          background: '#fff',
          borderRadius: 6,
          boxShadow: '0 2px 4px rgba(0,0,0,0.4)',
        }}/>
      </div>

      {/* Duration: fixed width */}
      <div style={{
        fontFamily: mono,
        fontSize: 12,
        fontVariantNumeric: 'tabular-nums',
        width: 64, textAlign: 'left',
        color: 'rgba(246,244,239,0.55)',
      }}>
        {fmt(duration)}
      </div>
    </div>
  );
}

function IconButton({ children, onClick, title }) {
  const [hover, setHover] = React.useState(false);
  return (
    <button
      onClick={onClick}
      title={title}
      onMouseEnter={() => setHover(true)}
      onMouseLeave={() => setHover(false)}
      style={{
        width: 28, height: 28,
        display: 'flex', alignItems: 'center', justifyContent: 'center',
        background: hover ? 'rgba(255,255,255,0.12)' : 'rgba(255,255,255,0.04)',
        border: '1px solid rgba(255,255,255,0.1)',
        borderRadius: 6,
        color: '#f6f4ef',
        cursor: 'pointer',
        padding: 0,
        transition: 'background 120ms',

  );
}


Object.assign(window, {

  TimelineContext, useTime, useTimeline,
  Sprite, SpriteContext, useSprite,
  TextSprite, ImageSprite, RectSprite,
  Stage, PlaybackBar,
});

        v === 'Lost'  ? 'no clean line of sight' :
        v === 'OOO'   ? 'last sync 6+ days ago'  :

// Evaluate a metric's numeric value at time t using its frame keyframes.
function evalFramesNum(t, frames) {
  if (!frames || frames.length === 0) return 0;
  if (t <= frames[0][0]) return frames[0][1];
  if (t >= frames[frames.length - 1][0]) return frames[frames.length - 1][1];
  for (let i = 0; i < frames.length - 1; i++) {
    const [t1, v1] = frames[i];
    const [t2, v2] = frames[i + 1];
    if (t >= t1 && t <= t2) {
      const span = t2 - t1;
      const p = span === 0 ? 0 : (t - t1) / span;
      return v1 + p * (v2 - v1);
    }
  }
  return frames[frames.length - 1][1];
}

// Evaluate a metric's text value at time t — step to latest reached frame.
function evalFramesText(t, frames) {
  if (!frames || frames.length === 0) return '';
  let v = frames[0][1];
  for (let i = 0; i < frames.length; i++) {
    if (t >= frames[i][0]) v = frames[i][1];
  }
  return v;
}

  <script type="text/babel" data-presets="env,react">
// compare-components.jsx — reusable UI parts for the Two Paths animation.

const { Sprite, useTime, useSprite, interpolate, animate, Easing, clamp } = window;

// ── tokens (mirror the deck) ────────────────────────────────────────────────
const C = {
  ink:    '#11161d',
  ink2:   '#2a323c',
  muted:  '#626d78',
  muted2: '#8a96a2',
  line:   '#d8dde3',
  line2:  '#ebeef2',
  paper:  '#f6f7f4',
  paper2: '#efefe9',
  surface:'#ffffff',
  green:  '#0d806c',
  green2: '#e2f2ee',
  green3: '#f6fbf9',
  gold:   '#bd8427',
  gold2:  '#f5e9d2',
  blue:   '#4269d6',
  blue2:  '#e2eaf6',
  dark:   '#17202b',
  dark2:  '#243040',
  risk:   '#b84a4a',
  risk2:  '#f6dede',
};

// ── small helpers ───────────────────────────────────────────────────────────
const fadeIn = (t, start, dur = 0.45, ease = Easing.easeOutCubic) =>
  ease(clamp((t - start) / dur, 0, 1));

const fadeOut = (t, start, dur = 0.4, ease = Easing.easeInCubic) =>
  1 - ease(clamp((t - start) / dur, 0, 1));

// Eased number that climbs through a list of (time, value) keyframes.
const stepValueAt = (t, frames) => {
  for (let i = frames.length - 1; i >= 0; i--) {
    if (t >= frames[i][0]) return frames[i][1];
  }
  return frames[0][1];
};

// ── small graphic primitives ────────────────────────────────────────────────

// A flat tag pill, deck style.
function Tag({ tone = 'muted', children, style }) {
  const tones = {
    muted:  { color: C.muted,  bg: C.surface, border: C.line },
    ink:    { color: '#fff',   bg: C.ink,     border: C.ink },
    green:  { color: C.green,  bg: C.green2,  border: C.green2 },
    gold:   { color: C.gold,   bg: C.gold2,   border: C.gold2 },
    risk:   { color: C.risk,   bg: C.risk2,   border: C.risk2 },
    paper:  { color: C.ink,    bg: C.paper2,  border: C.line },
  }[tone] || {};
  return (
    <span style={{
      display: 'inline-flex', alignItems: 'center', gap: 8,
      padding: '4px 12px',
      fontSize: 14, fontWeight: 700,
      letterSpacing: '0.10em', textTransform: 'uppercase',
      color: tones.color, background: tones.bg,
      border: `1px solid ${tones.border}`,
      borderRadius: 999,
      whiteSpace: 'nowrap',
      ...style,
    }}>{children}</span>
  );
}

// A 14px square 'bullet'.
function Sq({ color = C.ink, style }) {
  return <span style={{ display: 'inline-block', width: 12, height: 12, background: color, flex: '0 0 12px', ...style }} />;
}

// A status icon for a step card.
function StatusIcon({ kind, color }) {
  const sz = 22;
  const stroke = 2.2;
  const common = { width: sz, height: sz, viewBox: '0 0 24 24', fill: 'none' };
  if (kind === 'done') {
    return (
      <svg {...common}>
        <rect x="1.5" y="1.5" width="21" height="21" fill={color}/>
        <path d="M6 12.5L10.5 17L18 8" stroke="#fff" strokeWidth={stroke} strokeLinecap="square"/>
      </svg>
    );
  }
  if (kind === 'wait') {
    return (
      <svg {...common}>
        <rect x="1.5" y="1.5" width="21" height="21" fill={color}/>
        <path d="M8 12h8M12 8v8" stroke="#fff" strokeWidth={stroke} strokeLinecap="square" opacity="0"/>
        <circle cx="12" cy="12" r="6" stroke="#fff" strokeWidth={stroke}/>
        <path d="M12 8v4l3 2" stroke="#fff" strokeWidth={stroke} strokeLinecap="square"/>
      </svg>
    );
  }
  if (kind === 'flag') {
    return (
      <svg {...common}>
        <rect x="1.5" y="1.5" width="21" height="21" fill={color}/>
        <path d="M12 6v8M12 17v1.5" stroke="#fff" strokeWidth={stroke} strokeLinecap="square"/>
      </svg>
    );
  }
  if (kind === 'lost') {
    return (
      <svg {...common}>
        <rect x="1.5" y="1.5" width="21" height="21" fill={color}/>
        <path d="M7 7L17 17M17 7L7 17" stroke="#fff" strokeWidth={stroke} strokeLinecap="square"/>
      </svg>
    );
  }
  // pending
  return (
    <svg {...common}>
      <rect x="2" y="2" width="20" height="20" stroke={C.line} strokeWidth="1.5" fill={C.surface}/>
    </svg>
  );
}

// ── animated number ─────────────────────────────────────────────────────────
function CountUp({ from = 0, to = 100, start, end, decimals = 0,
                   prefix = '', suffix = '',
                   style, ease = Easing.easeOutCubic }) {
  const t = useTime();
  const p = clamp((t - start) / (end - start), 0, 1);
  const v = from + (to - from) * ease(p);
  const txt = v.toFixed(decimals);
  return (
    <span style={{
      fontVariantNumeric: 'tabular-nums',
      fontFeatureSettings: '"tnum" 1',
      ...style,
    }}>
      {prefix}{txt}{suffix}
    </span>
  );
}

// ── Step card (used by both lanes) ──────────────────────────────────────────
// A row showing one stage. Three states:
//   pending  → low-key outline
//   active   → entry animation (fade + slide), filled background
//   stale    → only on traditional lane, after activation the card sits
//              with a 'waiting' breathing border to imply time passing
//
// Props:
//   stage  : { label, desc }
//   agent  : 'Scout' or 'BD inbox'
//   clock  : '09:14' or 'Day 9'
//   msg    : body line
//   t      : activation time
//   tone   : 'os' | 'slow' | 'wait' | 'flag' | 'lost'
function StepCard({
  index, stage, agent, clock, msg, t, tone = 'os',
  width = 880, height = 76, y = 0, lane = 'os',
}) {
  const time = useTime();
  const active = time >= t;
  const sinceActive = Math.max(0, time - t);

  // entry sequence: 0.35s scale-in
  const entry = active ? fadeIn(time, t, 0.45) : 0;
  const slide = active ? (1 - entry) * 12 : 12;

  // For traditional lane, after the step appears we let time visibly pass —
  // the card stays 'open' until the next step starts. We pulse a subtle line
  // to feel like an ongoing wait.
  const palette = {
    os:   { fill: C.green2, accent: C.green, icon: 'done',  iconColor: C.green },
    slow: { fill: C.surface, accent: C.gold,  icon: 'wait', iconColor: C.gold },
    wait: { fill: C.surface, accent: C.gold,  icon: 'wait', iconColor: C.gold },
    flag: { fill: C.surface, accent: C.risk,  icon: 'flag', iconColor: C.risk },
    lost: { fill: C.risk2,   accent: C.risk,  icon: 'lost', iconColor: C.risk },
  }[tone];

  const pendingOpacity = active ? 1 : 0.5;
  const cardBg = active ? palette.fill : C.surface;
  const borderCol = active ? palette.accent : C.line;
  const accentBarW = active ? entry * 6 : 0;

  return (
    <div style={{
      position: 'absolute',
      left: 0, top: y, width, height,
      transform: `translateY(${slide}px)`,
      opacity: active ? entry : pendingOpacity,
      transition: 'none',
    }}>
      {/* connecting tick line on left edge */}
      {index > 0 && (
        <div style={{
          position: 'absolute',
          left: 16, top: -10, width: 1, height: 10,
          background: active ? palette.accent : C.line,
          opacity: 0.7,
        }} />
      )}

      <div style={{
        position: 'relative',
        width: '100%', height: '100%',
        background: cardBg,
        border: `1px solid ${borderCol}`,
        boxSizing: 'border-box',
        display: 'flex',
        alignItems: 'center',
        padding: '0 22px 0 16px',
        gap: 18,
      }}>
        {/* left accent bar — fills as the step activates */}
        <div style={{
          position: 'absolute',
          left: 0, top: 0, bottom: 0,
          width: accentBarW,
          background: palette.accent,
          transition: 'none',
        }} />

        {/* index */}
        <div style={{
          width: 30, textAlign: 'right',
          fontSize: 13, fontWeight: 800, letterSpacing: '0.14em',
          color: C.muted2, fontFamily: 'JetBrains Mono, ui-monospace, monospace',
          marginLeft: 4,
        }}>{String(index + 1).padStart(2, '0')}</div>

        {/* status icon */}
        <div style={{ flex: '0 0 22px' }}>
          <StatusIcon kind={active ? palette.icon : 'pending'} color={palette.iconColor} />
        </div>

        {/* stage label + agent */}
        <div style={{ width: 220, flex: '0 0 220px' }}>
          <div style={{
            fontSize: 13, fontWeight: 800, letterSpacing: '0.14em',
            textTransform: 'uppercase', color: C.muted, lineHeight: 1,
          }}>
            {stage.label}
          </div>
          <div style={{
            fontSize: 19, fontWeight: 700, color: C.ink,
            marginTop: 6, letterSpacing: '-0.005em',
            lineHeight: 1.1,
          }}>{agent}</div>
        </div>

        {/* msg */}
        <div style={{
          flex: 1,
          fontSize: 16,
          fontWeight: 500,
          color: active ? C.ink2 : C.muted2,
          lineHeight: 1.32,
          paddingRight: 8,
        }}>{msg}</div>

        {/* clock chip */}
        <div style={{
          flex: '0 0 auto',
          background: active ? (lane === 'os' ? C.dark : C.ink) : C.paper2,
          color: active ? '#fff' : C.muted,
          padding: '6px 12px',
          fontSize: 13, fontWeight: 800,
          letterSpacing: '0.1em', textTransform: 'uppercase',
          fontFamily: 'JetBrains Mono, ui-monospace, monospace',
          minWidth: 78, textAlign: 'center',
        }}>{clock}</div>
      </div>
    </div>
  );
}

// ── A live "waiting" indicator that fades in between trad steps ─────────────
function WaitingDot({ x, y, color = C.muted2, label = 'waiting…' }) {
  const t = useTime();
  // gentle 1.6s sine breathing
  const pulse = 0.6 + 0.4 * (0.5 + 0.5 * Math.sin(t * 4.0));
  return (
    <div style={{
      position: 'absolute', left: x, top: y,
      display: 'flex', alignItems: 'center', gap: 8,
      fontSize: 12, fontWeight: 700, color,
      letterSpacing: '0.16em', textTransform: 'uppercase',
      fontFamily: 'JetBrains Mono, ui-monospace, monospace',
      whiteSpace: 'nowrap',
    }}>
      <span style={{
        display: 'inline-block',
        width: 8, height: 8, borderRadius: 4,
        background: color, opacity: pulse,
      }} />
      {label}
    </div>
  );
}

// ── Lane header (top of each column) ────────────────────────────────────────
function LaneHeader({ kind, title, sub, clock, accent }) {
  const isOS = kind === 'os';
  return (
    <div style={{
      position: 'absolute', left: 0, top: 0, width: '100%', height: 116,
    }}>
      <div style={{ display: 'flex', alignItems: 'flex-end', gap: 18 }}>
        <Sq color={accent} style={{ width: 20, height: 20, marginBottom: 12 }} />
        <div style={{
          fontSize: 14, fontWeight: 800, letterSpacing: '0.20em',
          textTransform: 'uppercase', color: C.muted, marginBottom: 14,
        }}>{title}</div>
        <div style={{
          fontSize: 14, fontWeight: 600, color: accent,
          letterSpacing: '0.04em',
          marginBottom: 14,
          textTransform: 'none',
        }}>{sub}</div>
      </div>

      <div style={{
        display: 'flex', alignItems: 'baseline', gap: 22,
        marginTop: 8,
      }}>
        <div style={{
          fontSize: 84, fontWeight: 800, color: isOS ? C.green : C.ink,
          letterSpacing: '-0.03em', lineHeight: 1,
          fontFamily: 'Inter, system-ui, sans-serif',
          fontVariantNumeric: 'tabular-nums',
        }}>{clock.big}</div>
        <div style={{
          fontSize: 22, fontWeight: 600, color: C.muted2,
          lineHeight: 1.2, maxWidth: 320,
        }}>{clock.sub}</div>
      </div>
    </div>
  );
}

Object.assign(window, {
  C, fadeIn, fadeOut, stepValueAt,
  Tag, Sq, StatusIcon, CountUp,
  StepCard, WaitingDot, LaneHeader,
});

// ── CompareROIStrip ────────────────────────────────────────────────────────
// Dual-side ROI scoreboard at the bottom of the canvas. For each metric,
// shows Path A and Path B's value side by side; both tick live with time.
// Mounted continuously from the start of the lanes so the user can watch
// the gap open up as the scroll/playhead advances.

function CompareROIStrip({ y, height = 276 }) {
  const t = window.useTime();
  const rise = fadeIn(t, window.BEATS.laneStart - 0.4, 0.6, Easing.easeOutCubic);
  if (rise <= 0.001) return null;

  return (
    <div style={{
      position: 'absolute',
      left: 0, top: y,
      width: '100%', height,
      background: C.dark, color: '#fff',
      opacity: rise,
      transform: `translateY(${(1 - rise) * 30}px)`,
    }}>
      <div style={{
        height: '100%',
        padding: '22px 56px 20px',
        display: 'flex', gap: 20,
        boxSizing: 'border-box',
      }}>
        {window.COMPARE_METRICS.map((m, i) => (
          <CompareCard
            key={m.key} metric={m} index={i}
            time={t}
            isLast={i === window.COMPARE_METRICS.length - 1}
          />
        ))}
      </div>
    </div>
  );
}

function CompareCard({ metric, index, time, isLast }) {
  const start = window.BEATS.laneStart - 0.2 + index * 0.18;
  const op = clamp(fadeIn(time, start, 0.5), 0, 1);

  const aValue = metric.isText
    ? window.evalFramesText(time, metric.a.frames)
    : window.evalFramesNum(time, metric.a.frames);
  const bValue = metric.isText
    ? window.evalFramesText(time, metric.b.frames)
    : window.evalFramesNum(time, metric.b.frames);

  const aNote = metric.a.noteFn ? metric.a.noteFn(aValue) : '';
  const bNote = metric.b.noteFn ? metric.b.noteFn(bValue) : '';

  return (
    <div style={{
      flex: 1, minWidth: 0,
      display: 'flex', flexDirection: 'column',

function ScrollCanvas({ time, duration, children }) {
  const ref = React.useRef(null);
  const [scale, setScale] = React.useState(1);

  React.useEffect(() => {
    const el = ref.current;
    if (!el) return;
    const measure = () => {
      const s = Math.min(
        el.clientWidth / CANVAS_W,
        el.clientHeight / CANVAS_H,
      );
      setScale(Math.max(0.05, s));
    };
    measure();
    const ro = new ResizeObserver(measure);
    ro.observe(el);
    window.addEventListener('resize', measure);
    return () => { ro.disconnect(); window.removeEventListener('resize', measure); };
  }, []);

  const ctx = React.useMemo(() => ({ time, duration, playing: false }), [time, duration]);

  return (
    <div ref={ref} style={{
      position: 'absolute', inset: 0,
      display: 'grid', placeItems: 'center',
      background: '#0a0d12',
      overflow: 'hidden',
    }}>
      {/* Outer box takes the SCALED footprint, so grid centering works
          correctly even when the viewport is narrower than CANVAS_W. */}
      <div style={{
        width: CANVAS_W * scale,
        height: CANVAS_H * scale,
        position: 'relative',
        overflow: 'hidden',
        boxShadow: '0 30px 80px rgba(0,0,0,0.45)',
      }}>
        <div style={{
          width: CANVAS_W, height: CANVAS_H,
          background: C.paper,
          position: 'absolute', left: 0, top: 0,
          transform: `scale(${scale})`,
          transformOrigin: 'top left',
        }}>
          <TimelineContext.Provider value={ctx}>
            {children}

        </div>
      </div>
    </div>
  );
}

      opacity: active ? 1 : 0.5,
      transition: 'opacity 240ms',
      pointerEvents: 'none',
    }}>
      <div style={{
        position: 'absolute', inset: 0,
        background: 'rgba(255,255,255,0.14)',
      }} />
      <div style={{
        position: 'absolute', left: 0, top: 0, width: '100%',
        height: `${pct * 100}%`,
        background: '#6dd0b9',
        transition: 'height 80ms linear',
      }} />
      {CHAPTERS.map((c, i) => {
        const y = (c.t / DURATION) * 100;
        const reached = t >= c.t;
        return (
          <div key={i} style={{
            position: 'absolute',
            left: -6, top: `${y}%`,
            width: 18, height: 2,
            background: reached ? '#6dd0b9' : 'rgba(255,255,255,0.5)',
          }} />
        );
      })}
    </div>
  );
}

function ChapterCaption({ ch, active }) {
  return (
    <div style={{
      position: 'absolute',
      left: 28, bottom: 28,
      maxWidth: 380,
      opacity: active ? 1 : 0,
      transition: 'opacity 240ms',
      pointerEvents: 'none',
    }}>
      <div style={{
        fontSize: 11, fontWeight: 800,
        letterSpacing: '0.22em', textTransform: 'uppercase',
        color: 'rgba(255,255,255,0.55)',
        fontFamily: 'JetBrains Mono, ui-monospace, monospace',
      }}>Chapter</div>
      <div style={{
        fontSize: 22, fontWeight: 700,
        color: '#fff', marginTop: 6,
        letterSpacing: '-0.01em',
        textShadow: '0 4px 18px rgba(0,0,0,0.6)',
      }}>{ch.title}</div>
    </div>
  );
}

function ScrollHint({ visible }) {
  return (
    <div style={{
      position: 'absolute',
      left: '50%', bottom: 36,
      transform: 'translateX(-50%)',
      opacity: visible ? 1 : 0,
      transition: 'opacity 300ms',
      display: 'flex', flexDirection: 'column',
      alignItems: 'center', gap: 12,
      pointerEvents: 'none',
    }}>
      <div style={{
        fontSize: 12, fontWeight: 800,
        letterSpacing: '0.24em', textTransform: 'uppercase',
        color: 'rgba(255,255,255,0.85)',
        fontFamily: 'JetBrains Mono, ui-monospace, monospace',
        background: 'rgba(0,0,0,0.6)',
        padding: '8px 14px',
      }}>Scroll to advance ↓</div>
    </div>
  );
}

// ── render ─────────────────────────────────────────────────────────────────
ReactDOM.createRoot(document.getElementById('root')).render(<Site />);

  </script>
</body>
</html>
